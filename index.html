<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吴鸣诗 | 古琴文化分享</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #4A7A4A;
            color: #fff;
            line-height: 1.6;
        }
        /* 导航栏 */
        nav {
            background-color: rgba(0,0,0,0.1);
            padding: 1rem 5%;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
        }
        /* 头部 */
        .hero {
            padding: 4rem 5%;
            text-align: center;
        }
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .hero p {
            font-size: 1rem;
            opacity: 0.9;
        }
        /* 内容区块 */
        .section {
            padding: 3rem 5%;
        }
        .section-title {
            background-color: #A67C52;
            display: inline-block;
            padding: 0.5rem 1.5rem;
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }
        /* 联系方式 */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        .contact-info a {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 0.2rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#home">首页</a>
        <a href="#about">个人简介</a>
        <a href="#honor">荣誉履历</a>
        <a href="#experience">授课经历</a>
        <a href="#contact">联系</a>
    </nav>

    <section class="hero" id="home">
        <h1>吴鸣诗</h1>
        <p>营派古琴传承人 | 古琴文化分享</p>
    </section>

    <section class="section" id="about">
        <div class="section-title">个人简介</div>
        <p>这里可以写你的个人介绍，比如习琴经历、代表曲目、教学理念等。</p>
    </section>

    <section class="section" id="honor">
        <div class="section-title">荣誉履历</div>
        <p>这里可以写你的获奖经历、行业认证、教学成果等。</p>
    </section>

    <section class="section" id="experience">
        <div class="section-title">授课经历</div>
        <p>这里可以写你的授课地点、课程设置、教学特色等。</p>
    </section>

    <section class="section" id="contact">
        <div class="section-title">联系</div>
        <div class="contact-info">
            <p>地址：金沪路1267号</p>
            <p>小红书：<a href="https://xiaohongshu.com/@古琴吴鸣诗" target="_blank">@古琴吴鸣诗</a></p>
            <p>bilibili：<a href="https://bilibili.com/@吴鸣诗" target="_blank">吴鸣诗</a></p>
        </div>
    </section>
</body>
</html>
